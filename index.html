<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Macht das Wachstum des Ja-Buttons geschmeidig */
        #yesBtn {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-pink-100 flex flex-col items-center justify-center min-h-screen text-center p-4 font-sans">

<div id="mainContainer">
    <h1 id="questionText" class="text-3xl font-bold text-pink-900 mb-8 flex items-center gap-2 justify-center">
        Do you want to go on a date on Friday the 24.04.26?
        <span class="text-3xl">💖</span>
    </h1>

    <div id="imageWrapper" class="mb-10 w-64 h-64 flex items-center justify-center mx-auto">
        <img id="displayImage" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZDl1cGpibjd6MnM0MHUxMmxvMnZpdjVkMjRtb3Z5N3ZsajRscXUyZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/GrMJkt8IxNvD6gwQ5Z/giphy.gif"
             alt="Bear GIF"
             class="max-w-full max-h-full object-contain">
    </div>

    <div id="buttonGroup" class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <button id="yesBtn" class="bg-green-600 text-white font-bold py-3 px-8 rounded-lg shadow-md hover:bg-green-700">
            Yes
        </button>

        <button id="noBtn" class="bg-red-600 text-white font-semibold py-2 px-6 rounded-md shadow hover:bg-red-700">
            No
        </button>
    </div>
</div>

<script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const displayImage = document.getElementById('displayImage');
    const mainContainer = document.getElementById('mainContainer');

    // 1. Liste der Texte für den Nein-Button
    const noTexts = [
        "Are you positive? 🤔",
        "Azro please... 🥺",
        "Are you SURE sure? 🥺",
        "Don't do this to me... 🥺",
        "I'm gonna cry... 🥺"
    ];

    // 2. Liste der Bilder/GIFs für den Nein-Button
    // Ersetze diese Links durch deine eigenen GIF-URLs!
    const noGifs = [
        "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExNjh2b294emRhbzIyaGJobzA3dWRkb2VjN2lhZ2Zhb2Qyam1uc2YzZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/H6cmWzp6LGFvqjidB7/giphy.gif",
        "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcDhudmM5cDVhMmxqeXo1amd1MnRxZHp3dXNyNDRzNmNsZHJvZ3E1biZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/lGBecpB2dIMwt6ohfI/giphy.gif",
        "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExYzU3YnQ3ZDk2a284OGtod2p6OTN2OGdidWs2MmdkMjVvaTgweG13dCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/XYEEvoX0Ub69ZgN9ai/giphy.gif",
        "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHIwdW9qZHg0eXpxZ3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/9Y5BbDSkSTiY8/giphy.gif",
        "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNWN3a2x6dndsaXc4OHBwbmJwajNsd28zc28ydzl2MHczaGc1MGdsaSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/7AzEXdIb1wyCTWJntb/giphy.gif"
    ];

    let noClickCount = 0;

    // Logik für den NEIN-Button
    noBtn.addEventListener('click', () => {
        if (noClickCount < noTexts.length) {
            noBtn.innerText = noTexts[noClickCount];
            displayImage.src = noGifs[noClickCount];
        } else {
            noBtn.innerText = "Okay... I'm really crying now 🥺";
        }

        noClickCount++;

        // Den JA-Button wachsen lassen
        const currentPaddingX = parseInt(window.getComputedStyle(yesBtn).paddingLeft);
        const currentPaddingY = parseInt(window.getComputedStyle(yesBtn).paddingTop);
        const currentFontSize = parseInt(window.getComputedStyle(yesBtn).fontSize);

        yesBtn.style.paddingLeft = (currentPaddingX + 20) + "px";
        yesBtn.style.paddingRight = (currentPaddingX + 20) + "px";
        yesBtn.style.paddingTop = (currentPaddingY + 10) + "px";
        yesBtn.style.paddingBottom = (currentPaddingY + 10) + "px";
        yesBtn.style.fontSize = (currentFontSize + 5) + "px";
    });

    // Logik für den JA-Button
    yesBtn.addEventListener('click', () => {
        // Seite komplett leeren und Erfolgslayout aufbauen
        document.body.innerHTML = `
            <div class="flex flex-col items-center pt-10 text-center w-full min-h-screen bg-pink-100 p-4">
                <h1 class="text-4xl font-extrabold text-pink-950 mb-4">YAY!!! 🎉</h1>
                <p class="text-xl text-pink-800 mb-6">See you on Friday Azroo!</p>

                <div class="w-64 h-64 mb-8 mx-auto">
                    <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExanB3b3RvaXI3d29hdjV5a2cyc2Fzdnd3YWNsdXI0MnRwOXpkZ2kwciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/C8ih1zB9e9KJLySClx/giphy.gif"
                         class="w-full h-full object-contain mx-auto rounded-lg">
                </div>

                <div id="countdown" class="flex justify-center gap-3 text-pink-900 font-bold">
                    <div class="bg-white p-3 rounded-xl shadow-md min-w-[70px]"><span id="days" class="text-2xl block">00</span> Tage</div>
                    <div class="bg-white p-3 rounded-xl shadow-md min-w-[70px]"><span id="hours" class="text-2xl block">00</span> Std</div>
                    <div class="bg-white p-3 rounded-xl shadow-md min-w-[70px]"><span id="minutes" class="text-2xl block">00</span> Min</div>
                    <div class="bg-white p-3 rounded-xl shadow-md min-w-[70px]"><span id="seconds" class="text-2xl block">00</span> Sek</div>
                </div>

                <p class="mt-10 text-pink-700 italic">Countdown bis zum 24.04.2026, 14:00 Uhr</p>
            </div>
        `;

        startCountdown();
    });

    function startCountdown() {
        // Zieldatum: 24. April 2026 um 18:00 Uhr
        const targetDate = new Date('April 24, 2026 14:00:00').getTime();

        const timer = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timer);
                const cdElement = document.getElementById('countdown');
                if(cdElement) cdElement.innerHTML = "<span class='text-2xl text-pink-600 font-bold'>The day is here! ❤️</span>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Werte in die Felder schreiben
            if(document.getElementById('days')) {
                document.getElementById('days').innerText = days.toString().padStart(2, '0');
                document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
            }
        }, 1000);
    }
</script>

</body>
</html>
